<button class="back-to-top" id="back-to-top" type="button" aria-label="Back to top">
  <span class="back-to-top-ring" aria-hidden="true"></span>
  <span class="back-to-top-icon" aria-hidden="true">↑</span>
</button>

<script>
(() => {
  const button = document.getElementById("back-to-top");
  let animationFrameId = null;

  const toggleButton = () => {
    if (!button) return;
    const shouldShow = window.scrollY > 280;
    button.classList.toggle("is-visible", shouldShow);
  };

  const easeInOutCubic = (t) => (
    t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2
  );

  const scrollToTopSlowly = () => {
    if (animationFrameId) {
      cancelAnimationFrame(animationFrameId);
    }

    const startY = window.scrollY;
    const duration = 1400;
    const startTime = performance.now();

    const step = (currentTime) => {
      const elapsed = currentTime - startTime;
      const progress = Math.min(elapsed / duration, 1);
      const easedProgress = easeInOutCubic(progress);
      const nextY = Math.round(startY * (1 - easedProgress));

      window.scrollTo(0, nextY);

      if (progress < 1) {
        animationFrameId = requestAnimationFrame(step);
      } else {
        animationFrameId = null;
      }
    };

    animationFrameId = requestAnimationFrame(step);
  };

  if (button) {
    button.addEventListener("click", () => {
      scrollToTopSlowly();
    });
  }

  window.addEventListener("scroll", toggleButton, { passive: true });
  toggleButton();

  if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
    document.querySelectorAll(".reveal-on-scroll").forEach((element) => {
      element.classList.add("is-visible");
    });
    return;
  }

  const revealTargets = document.querySelectorAll(
    ".hero-minimal, .page-header, .contact-hero, .card, .rail-item"
  );

  revealTargets.forEach((element, index) => {
    element.classList.add("reveal-on-scroll");
    element.style.setProperty("--reveal-delay", `${Math.min(index * 45, 240)}ms`);
  });

  const revealObserver = new IntersectionObserver((entries, observer) => {
    entries.forEach((entry) => {
      if (!entry.isIntersecting) return;
      entry.target.classList.add("is-visible");
      observer.unobserve(entry.target);
    });
  }, {
    threshold: 0.16,
    rootMargin: "0px 0px -8% 0px"
  });

  revealTargets.forEach((element) => {
    revealObserver.observe(element);
  });
})();
</script>
